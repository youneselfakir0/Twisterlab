apiVersion: apps/v1
kind: Deployment
metadata:
  name: twisterlab-api
  namespace: twisterlab
  labels:
    app: twisterlab
    component: api
    version: v3.8.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: twisterlab
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: twisterlab
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/youneselfakir0/twisterlab/api:v3.8.0-final
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: OLLAMA_BASE_URL
          value: "http://192.168.0.20:11434"
        - name: OLLAMA_MODEL
          value: "llama3.2:1b"
        - name: MAESTRO_USE_LLM
          value: "true"
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: twisterlab-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: twisterlab-config
              key: LOG_LEVEL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: twisterlab-secrets
              key: SECRET_KEY
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: twisterlab-secrets
              key: JWT_SECRET_KEY
        - name: POSTGRES_HOST
          value: "postgres.twisterlab.svc.cluster.local"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twisterlab-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          value: "redis.twisterlab.svc.cluster.local"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twisterlab-secrets
              key: REDIS_PASSWORD
        - name: ALLOWED_ORIGINS
          value: "http://localhost:3000,http://192.168.0.30:30091"
        - name: N8N_API_KEY
          value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJlZWY0YTlkMy03NTZhLTRhZWEtYWVhZS0xZGZmNmJmZGMxMmUiLCJpc3MiOiJuOG4iLCJhdWQiOiJwdWJsaWMtYXBpIiwianRpIjoiYTNhM2VlNzctYzA5Zi00MmUwLWJiODMtMjExZWFhOGVhZDg2IiwiaWF0IjoxNzc2MzYzNTE1fQ.TsNfaNEZzBTfhHKUxSr2w2OB5pJPtT8I5rQetCRTO0E"
        - name: N8N_BASE_URL
          value: "http://192.168.0.30:5678"
        - name: NOTION_TOKEN
          value: "ntn_p83568381507m9WWa5MaAxUsiEmDdzDvVb7daxAWxPy47l"
        - name: NOTION_DEFAULT_DATABASE_ID
          value: "3431f21b3b068087845cd838474d5464"
        volumeMounts:
        - name: archive-volume
          mountPath: /app/archives
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: archive-volume
        persistentVolumeClaim:
          claimName: twisterlab-archive-pvc
