server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- SECURITY HEADERS ---
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';";

    # --- GZIP COMPRESSION ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- STATIC ASSETS CACHING ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests
    location /api/ {
        proxy_pass http://twisterlab-api.twisterlab.svc.cluster.local:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy root-level metrics and health for easy external access
    location ~ ^/(metrics|health)$ {
        proxy_pass http://twisterlab-api.twisterlab.svc.cluster.local:8000/$1;
        proxy_set_header Host $host;
    }

    # Proxy /ws requests (WebSockets)
    location /ws/ {
        proxy_pass http://twisterlab-api.twisterlab.svc.cluster.local:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
