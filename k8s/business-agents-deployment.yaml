apiVersion: apps/v1
kind: Deployment
metadata:
  name: twisterlab-business-agents
  namespace: twisterlab
  labels:
    app: twisterlab
    component: business-agents
spec:
  replicas: 2 # Haute disponibilité
  selector:
    matchLabels:
      app: twisterlab
      component: business-agents
  template:
    metadata:
      labels:
        app: twisterlab
        component: business-agents
      annotations:
        # Configuration pour le scraping automatique de Prometheus
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: agents-container
        image: twisterlab/api:latest # Assuming the agents are part of the main image
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "twisterlab.agents.real.real_business_agents"]
        env:
        - name: ENV
          value: "production"
        - name: PYTHONPATH
          value: "/app/src"
        - name: N8N_BASE_URL
          valueFrom:
            config_map_key_ref:
              name: twisterlab-config
              key: n8n_url
        - name: N8N_API_KEY
          valueFrom:
            secret_key_ref:
              name: twisterlab-secrets
              key: n8n_api_key
        ports:
        - containerPort: 8000
          name: metrics
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          http_get:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          http_get:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: twisterlab-business-agents-svc
  namespace: twisterlab
spec:
  selector:
    app: twisterlab
    component: business-agents
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    name: metrics
