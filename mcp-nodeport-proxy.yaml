apiVersion: v1
kind: Service
metadata:
  name: mcp-nodeport-proxy
  namespace: twisterlab
  labels:
    app: mcp-unified
    component: mcp
spec:
  type: NodePort
  selector:
    app: mcp-unified
  ports:
    - name: mcp
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-ingress
  namespace: twisterlab
spec:
  ingressClassName: traefik
  rules:
    - host: mcp.twisterlab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-unified
                port:
                  number: 8080
