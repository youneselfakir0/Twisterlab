apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twisterlab-ui-react-ingress
  namespace: twisterlab
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "twisterlab-api"
spec:
  rules:
  - host: centre.twisterlab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: twisterlab-ui-react
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: twisterlab-api
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: twisterlab-api
            port:
              number: 8000
